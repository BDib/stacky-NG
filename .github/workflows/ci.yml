name: GitHub CI Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, Win32, ARM64]
        config: [Debug, Release]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: microsoft/setup-msbuild@v2

      - name: Configure CMake
        # -A sets the architecture (Win32 is the generator name for x86)
        run: cmake -B build -S . -A ${{ matrix.arch }} -DCMAKE_BUILD_TYPE=${{ matrix.config }}

      - name: Build
        run: cmake --build build --config ${{ matrix.config }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stacky-${{ matrix.arch }}-${{ matrix.config }}
          path: build/${{ matrix.config }}/stacky.exe